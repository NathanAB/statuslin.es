<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="statuslin.es">
  <title>statuslin.es</title>
  <!-- Coral brand circle: the primary token #c96442 (Anthropic's Claude coral, rgb 201/100/66). -->
  <circle cx="32" cy="32" r="32" fill="#c96442" />
  <!-- White pixel/terminal "s": a 5x7 bitmap glyph drawn as 6px cells, centered (x0=17, y0=11).
       Bitmap (# = white pixel):
         .####
         #....
         #....
         .###.
         ....#
         ....#
         ####.
  -->
  <g fill="#ffffff">
    <rect x="23" y="11" width="6" height="6" />
    <rect x="29" y="11" width="6" height="6" />
    <rect x="35" y="11" width="6" height="6" />
    <rect x="41" y="11" width="6" height="6" />
    <rect x="17" y="17" width="6" height="6" />
    <rect x="17" y="23" width="6" height="6" />
    <rect x="23" y="29" width="6" height="6" />
    <rect x="29" y="29" width="6" height="6" />
    <rect x="35" y="29" width="6" height="6" />
    <rect x="41" y="35" width="6" height="6" />
    <rect x="41" y="41" width="6" height="6" />
    <rect x="17" y="47" width="6" height="6" />
    <rect x="23" y="47" width="6" height="6" />
    <rect x="29" y="47" width="6" height="6" />
    <rect x="35" y="47" width="6" height="6" />
  </g>
</svg>
