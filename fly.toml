# PRODUCTION config — app "statuslines". Staging lives in fly.staging.toml.
#
# Promote a validated staging image to prod (no rebuild):
#   fly deploy --app statuslines --image registry.fly.io/statuslines-staging:<digest>
#
# KEEP IN SYNC with fly.staging.toml by hand — Fly can't include one file from another.
# [build], [processes], [http_service] internal_port/force_https, and [deploy] must match.
# What differs on purpose: prod sizes web and worker separately (web scaled up for a launch
# spike, worker left small) and keeps web warm; staging runs one small [[vm]] for both and
# scales web to zero.
app = "statuslines"
primary_region = "iad"

[build]

# Two process groups off one image: the public web server, and the always-on render worker.
# The worker is woken on submit via a 6PN wake ping (no public port); it drains the render_jobs
# queue through E2B, with a periodic safety drain as a fallback. It no longer polls the DB.
[processes]
  web = "bun run .output/server/index.mjs"
  worker = "bun run scripts/worker.ts"

[http_service]
  # Must match the app's PORT/EXPOSE in the Dockerfile (the listen port).
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["web"]
  [http_service.concurrency]
    type = "requests"
    # Lowered from 200/250 so Fly autostarts another web machine while this one is still
    # healthy — the old limit only tripped after latency had already blown up under load.
    # Tune against live Fly metrics.
    soft_limit = 40
    hard_limit = 80

[deploy]
  release_command = "bun run src/db/migrate.ts"

# Per-process machine sizing. Only the public web server needs to absorb a launch spike, so
# it gets shared-cpu-2x (≈2× the throughput of the 1x that collapsed at ~50 visits/s) and 1GB
# (clears the measured OOM cliff: peak RSS 446MB of 512 under load). Add horizontal headroom
# with `fly scale count web=N`. Numbers are starting points — tune against live metrics.
[[vm]]
  processes = ["web"]
  size = "shared-cpu-2x"
  memory = "1gb"

# The render worker just orchestrates E2B sandboxes (the heavy lifting runs in E2B, not here)
# and submissions are rate-limited, so it stays at the small, already-proven size.
[[vm]]
  processes = ["worker"]
  size = "shared-cpu-1x"
  memory = "512mb"
